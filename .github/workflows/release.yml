name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: windows
            goarch: amd64
          # Best-effort: cross-compiled like the rest but not validated on
          # real arm64 hardware (PRD §9 Q1).
          - goos: windows
            goarch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          BIN=evva
          if [ "$GOOS" = "windows" ]; then BIN=evva.exe; fi
          go build \
            -ldflags "-s -w -X github.com/johnny1110/evva/pkg/config.Version=${{ github.ref_name }} -X github.com/johnny1110/evva/pkg/config.CommitSHA=${{ github.sha }} -X github.com/johnny1110/evva/pkg/config.BuildDate=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o "$BIN" \
            ./cmd/evva

      - name: Package
        # Names and entry names must match pkg/update exactly: assetNameFor
        # expects evva-<goos>-<goarch>.tar.gz / .zip, and the extractors look
        # for an "evva" / "evva.exe" entry (self_replace.go).
        run: |
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip "evva-${{ matrix.goos }}-${{ matrix.goarch }}.zip" evva.exe
          else
            tar -czf "evva-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz" evva
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: evva-${{ matrix.goos }}-${{ matrix.goarch }}
          path: evva-${{ matrix.goos }}-${{ matrix.goarch }}.*

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          # Tags with a pre-release suffix (e.g. v1.4.4-beta.1) publish as a
          # GitHub pre-release so they never take the "Latest" badge; bare
          # stable tags (vX.Y.Z) publish as Latest. This is what keeps
          # `evva update` (which resolves /releases/latest) on the newest
          # stable while `evva update <tag>` can still pin a beta.
          prerelease: ${{ contains(github.ref_name, '-') }}
          make_latest: ${{ contains(github.ref_name, '-') && 'false' || 'true' }}
